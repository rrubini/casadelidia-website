<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Casa de Lídia</title>
    <meta name="description" content="Casa de Lídia - Em breve">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #2D3436 0%, #1a1d2e 50%, #2D3436 100%);
        font-family: 'Poppins', sans-serif;
        color: #ffffff;
        padding: 20px;
      }

      .container {
        text-align: center;
        max-width: 600px;
        animation: fadeIn 1s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        width: 280px;
        max-width: 80%;
        height: auto;
        margin-bottom: 40px;
        filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 16px;
        background: linear-gradient(90deg, #E8A849, #D4A85A, #8B7AA1, #6B7AA1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .tagline {
        font-size: 1.2rem;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 40px;
      }

      .coming-soon {
        display: inline-block;
        padding: 12px 32px;
        border: 2px solid transparent;
        border-radius: 50px;
        background: linear-gradient(#2D3436, #2D3436) padding-box,
                    linear-gradient(90deg, #E8A849, #6B7AA1) border-box;
        font-size: 1rem;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.9);
      }

      .divider {
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, #E8A849, #6B7AA1);
        margin: 40px auto;
        border-radius: 2px;
      }

      .contact {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.6);
      }

      .contact a {
        color: #E8A849;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .contact a:hover {
        color: #6B7AA1;
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.8rem;
        }

        .tagline {
          font-size: 1rem;
        }

        .logo {
          width: 220px;
          margin-bottom: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="assets/logo.jpg" alt="Casa de Lídia" class="logo">

      <h1>Bem-vindo</h1>
      <p class="tagline">Estamos preparando algo especial para você</p>

      <span class="coming-soon">Em Breve</span>

      <div class="divider"></div>

      <p class="contact">
        Entre em contato: <a href="mailto:contato@casadelidia.com.br">contato@casadelidia.com.br</a>
      </p>
    </div>
  </body>
</html>
